<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTS Cleaning Solutions - Lead Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-input: #252525;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #333333;
            --gold: #d4af37;
            --green: #10b981;
            --yellow: #fbbf24;
            --orange: #f97316;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-stats {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-box {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 4px;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button.secondary {
            background-color: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        button.secondary:hover {
            background-color: var(--border);
        }

        button.danger {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        button.danger:hover {
            background-color: rgba(239, 68, 68, 0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        select {
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
        }

        select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .leads-grid {
            display: grid;
            gap: 16px;
        }

        .lead-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            align-items: start;
            transition: all 0.2s;
        }

        .lead-card:hover {
            border-color: var(--accent);
        }

        .lead-card.gold {
            border-left: 4px solid var(--gold);
        }

        .lead-card.green {
            border-left: 4px solid var(--green);
        }

        .lead-card.yellow {
            border-left: 4px solid var(--yellow);
        }

        .lead-card.orange {
            border-left: 4px solid var(--orange);
        }

        .lead-info {
            display: grid;
            gap: 12px;
        }

        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            gap: 12px;
        }

        .lead-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .lead-type {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .score-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
        }

        .score-badge.gold {
            background-color: rgba(212, 175, 55, 0.2);
            color: var(--gold);
        }

        .score-badge.green {
            background-color: rgba(16, 185, 129, 0.2);
            color: var(--green);
        }

        .score-badge.yellow {
            background-color: rgba(251, 191, 36, 0.2);
            color: var(--yellow);
        }

        .score-badge.orange {
            background-color: rgba(249, 115, 22, 0.2);
            color: var(--orange);
        }

        .lead-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            font-size: 13px;
        }

        .lead-detail {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .lead-label {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .lead-value {
            color: var(--text-primary);
            word-break: break-word;
        }

        .lead-value a {
            color: var(--accent);
            text-decoration: none;
        }

        .lead-value a:hover {
            text-decoration: underline;
        }

        .lead-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .tag {
            display: inline-block;
            padding: 3px 8px;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .lead-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 100px;
        }

        .lead-actions button {
            padding: 8px 12px;
            font-size: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            max-width: 700px;
            width: 90%;
            margin: 20px auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 24px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            background-color: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 13px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .draft-section {
            margin-bottom: 24px;
        }

        .draft-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .draft-item {
            margin-bottom: 16px;
            padding: 12px;
            background-color: var(--bg-input);
            border-radius: 6px;
        }

        .draft-number {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .draft-text {
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 8px;
            padding: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            border-left: 2px solid var(--accent);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .draft-actions {
            display: flex;
            gap: 8px;
        }

        .draft-actions button {
            flex: 1;
            font-size: 12px;
            padding: 6px 10px;
        }

        .contact-section {
            margin-top: 16px;
            padding: 12px;
            background-color: var(--bg-input);
            border-radius: 6px;
        }

        .contact-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .contact-field {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .contact-label {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .contact-value {
            color: var(--text-primary);
            word-break: break-all;
        }

        .score-breakdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 16px;
            padding: 12px;
            background-color: var(--bg-input);
            border-radius: 6px;
        }

        .score-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .score-item-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 600;
        }

        .score-item-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
        }

        @media (max-width: 768px) {
            .lead-card {
                grid-template-columns: 1fr;
            }

            .filters {
                grid-template-columns: 1fr;
            }

            .lead-details {
                grid-template-columns: 1fr;
            }

            .contact-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>VTS Cleaning Solutions</h1>
                <div style="color: var(--text-secondary); font-size: 13px; margin-top: 4px;">Lead Generation Dashboard</div>
            </div>
            <div class="header-controls">
                <div class="header-stats">
                    <div class="stat-box">
                        <div class="stat-value" id="statGold">0</div>
                        <div class="stat-label">Gold</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="statGreen">0</div>
                        <div class="stat-label">Green</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                </div>
                <button onclick="openAddLeadModal()">+ Add Lead</button>
                <button onclick="alert('Import feature coming next')">Import Leads</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('potential')">Potential Leads</button>
            <button class="tab" onclick="switchTab('outreached')">Already Outreached</button>
            <button class="tab" onclick="switchTab('notnow')">Not Now</button>
        </div>

        <!-- Potential Leads Tab -->
        <div id="potential" class="tab-content active">
            <div class="filters">
                <select onchange="filterLeads()">
                    <option value="">All Scores</option>
                    <option value="gold">Gold (36-40)</option>
                    <option value="green">Green (27-35)</option>
                    <option value="yellow">Yellow (20-26)</option>
                    <option value="orange">Orange (1-19)</option>
                </select>
                <select onchange="filterLeads()" id="typeFilter">
                    <option value="">All Types</option>
                </select>
                <select onchange="filterLeads()" id="cityFilter">
                    <option value="">All Cities</option>
                </select>
                <select onchange="filterLeads()" id="newBuildFilter">
                    <option value="">All New Build</option>
                    <option value="Yes">New Build - Yes</option>
                    <option value="Maybe">New Build - Maybe</option>
                    <option value="No">New Build - No</option>
                </select>
            </div>
            <div class="leads-grid" id="potentialLeads"></div>
        </div>

        <!-- Already Outreached Tab -->
        <div id="outreached" class="tab-content">
            <div class="leads-grid" id="outreachedLeads"></div>
        </div>

        <!-- Not Now Tab -->
        <div id="notnow" class="tab-content">
            <div class="leads-grid" id="notnowLeads"></div>
        </div>
    </div>

    <!-- Add Lead Modal -->
    <div class="modal" id="addLeadModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeAddLeadModal()">×</button>
            <div class="modal-title">Add New Lead</div>
            <form onsubmit="submitAddLead(event)">
                <div class="form-group">
                    <label>Business Name *</label>
                    <input type="text" id="formName" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="formEmail">
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" id="formPhone">
                    </div>
                </div>

                <div class="form-group">
                    <label>Website</label>
                    <input type="url" id="formWebsite">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City/Location *</label>
                        <input type="text" id="formCity" required>
                    </div>
                    <div class="form-group">
                        <label>Business Type *</label>
                        <select id="formType" required>
                            <option value="">Select type</option>
                            <option value="Dentist">Dentist</option>
                            <option value="Chiropractor">Chiropractor</option>
                            <option value="Medical Clinic">Medical Clinic</option>
                            <option value="Urgent Care">Urgent Care</option>
                            <option value="Physical Therapy">Physical Therapy</option>
                            <option value="Optometry">Optometry</option>
                            <option value="Med Spa">Med Spa</option>
                            <option value="Property Manager">Property Manager</option>
                            <option value="Commercial Office">Commercial Office</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>New Build *</label>
                        <select id="formNewBuild" required>
                            <option value="">Select</option>
                            <option value="Yes">Yes</option>
                            <option value="Maybe">Maybe</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Property Type *</label>
                        <select id="formPropertyType" required>
                            <option value="">Select</option>
                            <option value="Property Manager">Property Manager</option>
                            <option value="Tenant">Tenant</option>
                            <option value="Unknown">Unknown</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Has Cleaner *</label>
                        <select id="formHasCleaner" required>
                            <option value="">Select</option>
                            <option value="Yes">Yes</option>
                            <option value="Maybe">Maybe</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                </div>

                <div style="margin-top: 20px; padding: 16px; background-color: var(--bg-input); border-radius: 6px;">
                    <div style="font-size: 13px; font-weight: 600; margin-bottom: 12px;">Scoring (1-10 each)</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Need to Clean (1-10)</label>
                            <input type="number" id="formNeed" min="1" max="10" value="5" required>
                        </div>
                        <div class="form-group">
                            <label>Decision Maker Access (1-10)</label>
                            <input type="number" id="formDecision" min="1" max="10" value="5" required>
                        </div>
                        <div class="form-group">
                            <label>Size/Revenue (1-10)</label>
                            <input type="number" id="formSize" min="1" max="10" value="5" required>
                        </div>
                        <div class="form-group">
                            <label>Urgency (1-10)</label>
                            <input type="number" id="formUrgency" min="1" max="10" value="5" required>
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="secondary" onclick="closeAddLeadModal()">Cancel</button>
                    <button type="submit">Add Lead</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Draft Modal -->
    <div class="modal" id="draftModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeDraftModal()">×</button>
            <div class="modal-title" id="draftLeadName"></div>
            <div style="color: var(--text-secondary); font-size: 13px; margin-bottom: 16px;" id="draftLeadType"></div>

            <div class="contact-section">
                <div class="contact-info" id="draftContactInfo"></div>
            </div>

            <div class="score-breakdown" id="draftScores"></div>

            <!-- Email Drafts -->
            <div class="draft-section" id="emailSection" style="display: none;">
                <div class="draft-title">Email Drafts (3 options) - Send from: quotes@vtacleaningsolutions.com</div>
                <div id="emailDrafts"></div>
                <button style="width: 100%; margin-top: 12px;" onclick="sendEmail()" id="sendEmailBtn">Send Email</button>
            </div>

            <!-- Text Drafts -->
            <div class="draft-section" id="textSection" style="display: none;">
                <div class="draft-title">Text Drafts (3 options) - Send from: 949-424-3230</div>
                <div id="textDrafts"></div>
                <button style="width: 100%; margin-top: 12px;" onclick="sendText()" id="sendTextBtn">Send Text</button>
            </div>

            <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);">
                <button class="secondary" style="width: 100%;" onclick="closeDraftModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Sample leads data
        const sampleLeads = [

                city: "San Juan Capistrano",
                businessType: "Chiropractor",

                city: "Dana Point",
                businessType: "Medical Clinic",
                newBuild: "Yes",
                propertyType: "Property Manager",
                hasCleaner: "Maybe",
                needScore: 10,
                decisionScore: 9,
                sizeScore: 9,
                urgencyScore: 9
            },
            {

                businessName: "Vision Optometry Center",
                email: "appointments@visionopt.com",
                phone: "949-678-9012",
                website: "visionopt.com",
                city: "Capistrano Beach",
                businessType: "Optometry",
                newBuild: "No",
                propertyType: "Tenant",
                hasCleaner: "Yes",
                needScore: 7,
                decisionScore: 6,
                sizeScore: 6,
                urgencyScore: 5
            },
            {
                id: 5,
                businessName: "Advanced Physical Therapy",
                email: "info@advancedpt.com",
                phone: "949-789-0123",
                website: "advancedpt.com",
                city: "Rancho Mission Viejo",
                businessType: "Physical Therapy",
                newBuild: "Maybe",
                propertyType: "Property Manager",
                hasCleaner: "No",
                needScore: 8,
                decisionScore: 7,
                sizeScore: 7,
                urgencyScore: 8
            },
            {
                id: 6,
                businessName: "Ocean View Urgent Care",
                email: "contact@oceanviewuc.com",
                phone: "949-890-1234",
                website: "oceanviewuc.com",
                city: "Dana Point",
                businessType: "Urgent Care",
                newBuild: "Yes",
                propertyType: "Property Manager",
                hasCleaner: "Maybe",
                needScore: 10,
                decisionScore: 10,
                sizeScore: 8,
                urgencyScore: 10
            }
        ];

        // Data structure
        const DATA_KEY = 'vtsLeadData';
        let data = {
            potential: [],
            outreached: [],
            notnow: []
        };
        let nextId = 100;

        // Initialize
        function init() {
            loadData();
            if (data.potential.length === 0) {
                // Add sample leads on first load
                data.potential = sampleLeads.map(lead => ({
                    ...lead,
                    totalScore: lead.needScore + lead.decisionScore + lead.sizeScore + lead.urgencyScore,
                    scoreTier: getScoreTier(lead.needScore + lead.decisionScore + lead.sizeScore + lead.urgencyScore),
                    status: 'potential'
                }));
                nextId = Math.max(...data.potential.map(l => l.id)) + 1;
                saveData();
            }
            renderAll();
            populateFilters();
        }

        // Data management
        function loadData() {
            const stored = localStorage.getItem(DATA_KEY);
            if (stored) {
                try {
                    data = JSON.parse(stored);
                } catch (e) {
                    console.error('Error loading data:', e);
                }
            }
        }

        function saveData() {
            localStorage.setItem(DATA_KEY, JSON.stringify(data));
        }

        // Scoring
        function getScoreTier(total) {
            if (total >= 36) return 'gold';
            if (total >= 27) return 'green';
            if (total >= 20) return 'yellow';
            return 'orange';
        }

        // UI Functions
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function renderLeads(leads, containerId) {
            const container = document.getElementById(containerId);
            if (leads.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-title">No leads</div></div>';
                return;
            }

            container.innerHTML = leads.map(lead => {
                const totalScore = lead.totalScore;
                const color = lead.scoreTier;
                return `
                    <div class="lead-card ${color}">
                        <div class="lead-info">
                            <div class="lead-header">
                                <div>
                                    <div class="lead-name">${lead.businessName}</div>
                                    <div class="lead-type">${lead.businessType} • ${lead.city}</div>
                                </div>
                                <div class="score-badge ${color}">Score: ${totalScore}</div>
                            </div>

                            <div class="lead-details">
                                ${lead.website ? `<div class="lead-detail"><div class="lead-label">Website</div><div class="lead-value"><a href="https://${lead.website}" target="_blank">${lead.website}</a></div></div>` : ''}
                                ${lead.email ? `<div class="lead-detail"><div class="lead-label">Email</div><div class="lead-value"><a href="mailto:${lead.email}">${lead.email}</a></div></div>` : ''}
                                ${lead.phone ? `<div class="lead-detail"><div class="lead-label">Phone</div><div class="lead-value"><a href="tel:${lead.phone}">${lead.phone}</a></div></div>` : ''}
                                <div class="lead-detail"><div class="lead-label">Location</div><div class="lead-value">${lead.city}</div></div>
                            </div>

                            <div class="lead-tags">
                                <span class="tag">New Build: ${lead.newBuild}</span>
                                <span class="tag">Type: ${lead.propertyType}</span>
                                <span class="tag">Cleaner: ${lead.hasCleaner}</span>
                            </div>
                        </div>

                        <div class="lead-actions">
                            ${containerId === 'potentialLeads' ? `
                                <button onclick="openDraft(${lead.id})">Draft</button>
                                <button class="secondary" onclick="moveToNotnow(${lead.id})">Not Now</button>
                            ` : ''}
                            ${(containerId === 'outreachedLeads' || containerId === 'notnowLeads') ? `
                                <button class="danger" onclick="removeLead('${containerId === 'outreachedLeads' ? 'outreached' : 'notnow'}', ${lead.id})">Remove</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderAll() {
            renderLeads(data.potential, 'potentialLeads');
            renderLeads(data.outreached, 'outreachedLeads');
            renderLeads(data.notnow, 'notnowLeads');
            updateStats();
        }

        function updateStats() {
            const gold = data.potential.filter(l => l.scoreTier === 'gold').length;
            const green = data.potential.filter(l => l.scoreTier === 'green').length;
            document.getElementById('statGold').textContent = gold;
            document.getElementById('statGreen').textContent = green;
            document.getElementById('statTotal').textContent = data.potential.length;
        }

        function populateFilters() {
            const types = [...new Set(data.potential.map(l => l.businessType))].sort();
            const cities = [...new Set(data.potential.map(l => l.city))].sort();

            let typeHtml = '<option value="">All Types</option>';
            types.forEach(type => {
                typeHtml += `<option value="${type}">${type}</option>`;
            });
            document.getElementById('typeFilter').innerHTML = typeHtml;

            let cityHtml = '<option value="">All Cities</option>';
            cities.forEach(city => {
                cityHtml += `<option value="${city}">${city}</option>`;
            });
            document.getElementById('cityFilter').innerHTML = cityHtml;
        }

        function filterLeads() {
            const scoreFilter = document.querySelector('.filters select').value;
            const typeFilter = document.getElementById('typeFilter').value;
            const cityFilter = document.getElementById('cityFilter').value;
            const newBuildFilter = document.getElementById('newBuildFilter').value;

            let filtered = data.potential;

            if (scoreFilter) {
                filtered = filtered.filter(l => l.scoreTier === scoreFilter);
            }
            if (typeFilter) {
                filtered = filtered.filter(l => l.businessType === typeFilter);
            }
            if (cityFilter) {
                filtered = filtered.filter(l => l.city === cityFilter);
            }
            if (newBuildFilter) {
                filtered = filtered.filter(l => l.newBuild === newBuildFilter);
            }

            renderLeads(filtered, 'potentialLeads');
        }

        // Lead actions
        function moveToNotnow(id) {
            const lead = data.potential.find(l => l.id === id);
            if (lead) {
                data.potential = data.potential.filter(l => l.id !== id);
                lead.status = 'notnow';
                data.notnow.push(lead);
                saveData();
                renderAll();
                populateFilters();
            }
        }

        function removeLead(status, id) {
            const list = status === 'outreached' ? data.outreached : data.notnow;
            data[status] = list.filter(l => l.id !== id);
            saveData();
            renderAll();
        }

        // Add Lead Modal
        function openAddLeadModal() {
            document.getElementById('addLeadModal').classList.add('active');
        }

        function closeAddLeadModal() {
            document.getElementById('addLeadModal').classList.remove('active');
            document.querySelector('#addLeadModal form').reset();
        }

        function submitAddLead(event) {
            event.preventDefault();

            const needScore = parseInt(document.getElementById('formNeed').value);
            const decisionScore = parseInt(document.getElementById('formDecision').value);
            const sizeScore = parseInt(document.getElementById('formSize').value);
            const urgencyScore = parseInt(document.getElementById('formUrgency').value);
            const totalScore = needScore + decisionScore + sizeScore + urgencyScore;

            const lead = {
                id: nextId++,
                businessName: document.getElementById('formName').value,
                email: document.getElementById('formEmail').value || '',
                phone: document.getElementById('formPhone').value || '',
                website: document.getElementById('formWebsite').value || '',
                city: document.getElementById('formCity').value,
                businessType: document.getElementById('formType').value,
                newBuild: document.getElementById('formNewBuild').value,
                propertyType: document.getElementById('formPropertyType').value,
                hasCleaner: document.getElementById('formHasCleaner').value,
                needScore: needScore,
                decisionScore: decisionScore,
                sizeScore: sizeScore,
                urgencyScore: urgencyScore,
                totalScore: totalScore,
                scoreTier: getScoreTier(totalScore),
                status: 'potential'
            };

            // Keep max 50 leads
            if (data.potential.length >= 50) {
                // Remove lowest scoring lead
                data.potential.sort((a, b) => b.totalScore - a.totalScore);
                data.potential.pop();
            }

            data.potential.unshift(lead);
            data.potential.sort((a, b) => b.totalScore - a.totalScore);
            saveData();
            renderAll();
            populateFilters();
            closeAddLeadModal();
        }

        // Draft modal
        function openDraft(id) {
            const lead = data.potential.find(l => l.id === id);
            if (!lead) return;

            window.currentLead = lead;
            const totalScore = lead.totalScore;
            const color = lead.scoreTier;

            document.getElementById('draftLeadName').textContent = lead.businessName;
            document.getElementById('draftLeadType').textContent = `${lead.businessType} • ${lead.city} • Score: ${totalScore} (${color.toUpperCase()})`;

            // Contact info
            let contactHtml = '';
            if (lead.email) {
                contactHtml += `
                    <div class="contact-field">
                        <div class="contact-label">Email</div>
                        <div class="contact-value">${lead.email}</div>
                    </div>
                `;
            }
            if (lead.phone) {
                contactHtml += `
                    <div class="contact-field">
                        <div class="contact-label">Phone</div>
                        <div class="contact-value">${lead.phone}</div>
                    </div>
                `;
            }
            document.getElementById('draftContactInfo').innerHTML = contactHtml || '<div style="color: var(--text-secondary);">No contact info available</div>';

            // Scores
            const scoresHtml = `
                <div class="score-item">
                    <div class="score-item-label">Need to Clean</div>
                    <div class="score-item-value">${lead.needScore}</div>
                </div>
                <div class="score-item">
                    <div class="score-item-label">Decision Maker</div>
                    <div class="score-item-value">${lead.decisionScore}</div>
                </div>
                <div class="score-item">
                    <div class="score-item-label">Size/Revenue</div>
                    <div class="score-item-value">${lead.sizeScore}</div>
                </div>
                <div class="score-item">
                    <div class="score-item-label">Urgency</div>
                    <div class="score-item-value">${lead.urgencyScore}</div>
                </div>
                <div class="score-item">
                    <div class="score-item-label">Total Score</div>
                    <div class="score-item-value" style="color: ${color === 'gold' ? 'var(--gold)' : color === 'green' ? 'var(--green)' : color === 'yellow' ? 'var(--yellow)' : 'var(--orange)'};">${totalScore}</div>
                </div>
            `;
            document.getElementById('draftScores').innerHTML = scoresHtml;

            // Email section
            if (lead.email) {
                document.getElementById('emailSection').style.display = 'block';
                generateEmailDrafts(lead);
            } else {
                document.getElementById('emailSection').style.display = 'none';
            }

            // Text section
            if (lead.phone) {
                document.getElementById('textSection').style.display = 'block';
                generateTextDrafts(lead);
            } else {
                document.getElementById('textSection').style.display = 'none';
            }

            document.getElementById('draftModal').classList.add('active');
        }

        function generateEmailDrafts(lead) {
            const drafts = [
                `Hi,\n\nWe specialize in cleaning ${lead.businessType.toLowerCase()}s in the ${lead.city} area. A clean, hygienic environment is critical for patient comfort and your reputation.\n\nWould you be open to a quick conversation about how we can help maintain your space?\n\nBest,\nVTS Cleaning Solutions\n949-424-3230`,
                `Hello,\n\nVTS Cleaning Solutions offers customized cleaning services for ${lead.businessType.toLowerCase()}s. ${lead.newBuild === 'Yes' ? 'With your recent opening, we can' : 'We can'} provide reliable, professional service tailored to your needs.\n\nLet's discuss what works best for your facility.\n\nThanks,\nVTS Cleaning Solutions\n949-424-3230`,
                `Hi there,\n\nWe work with ${lead.businessType.toLowerCase()}s throughout Orange County to maintain spotless, professional environments. From routine cleaning to specialized needs, we've got you covered.\n\nAvailable for a quick call this week?\n\nBest regards,\nVTS Cleaning Solutions\n949-424-3230`
            ];

            let html = '';
            drafts.forEach((draft, index) => {
                html += `
                    <div class="draft-item">
                        <div class="draft-number">Draft Option ${index + 1}</div>
                        <div class="draft-text">${draft}</div>
                        <div class="draft-actions">
                            <button class="secondary" onclick="copyToClipboard('${escapeQuotes(draft)}')">Copy</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('emailDrafts').innerHTML = html;
            window.currentEmailDraft = drafts[0];
        }

        function generateTextDrafts(lead) {
            const drafts = [
                `Hi ${lead.businessName}, VTS Cleaning Solutions here. We specialize in cleaning ${lead.businessType.toLowerCase()}s in ${lead.city}. Would you be open to a quick conversation? 949-424-3230`,
                `Hello! VTS Cleaning can help maintain a spotless, professional ${lead.businessType.toLowerCase()}. Interested in reliable service? Let's chat. 949-424-3230`,
                `Hi, VTS Cleaning Solutions. We work with local ${lead.businessType.toLowerCase()}s. Looking to upgrade your cleaning? Let's discuss. 949-424-3230`
            ];

            let html = '';
            drafts.forEach((draft, index) => {
                html += `
                    <div class="draft-item">
                        <div class="draft-number">Draft Option ${index + 1}</div>
                        <div class="draft-text">${draft}</div>
                        <div class="draft-actions">
                            <button class="secondary" onclick="copyToClipboard('${escapeQuotes(draft)}')">Copy</button>
                        </div>
                    </div>
                `;
            });
            document.getElementById('textDrafts').innerHTML = html;
            window.currentTextDraft = drafts[0];
        }

        function sendEmail() {
            const lead = window.currentLead;
            if (!lead.email) return;

            if (confirm(`Mark "${lead.businessName}" as contacted via email?\n\nThis will move them to "Already Outreached."`)) {
                const lead_idx = data.potential.findIndex(l => l.id === lead.id);
                if (lead_idx !== -1) {
                    const movedLead = data.potential[lead_idx];
                    data.potential.splice(lead_idx, 1);
                    movedLead.status = 'outreached';
                    data.outreached.push(movedLead);
                    saveData();
                    renderAll();
                    populateFilters();
                    closeDraftModal();
                    alert('Lead moved to "Already Outreached."');
                }
            }
        }

        function sendText() {
            const lead = window.currentLead;
            if (!lead.phone) return;

            if (confirm(`Mark "${lead.businessName}" as contacted via text?\n\nThis will move them to "Already Outreached."`)) {
                const lead_idx = data.potential.findIndex(l => l.id === lead.id);
                if (lead_idx !== -1) {
                    const movedLead = data.potential[lead_idx];
                    data.potential.splice(lead_idx, 1);
                    movedLead.status = 'outreached';
                    data.outreached.push(movedLead);
                    saveData();
                    renderAll();
                    populateFilters();
                    closeDraftModal();
                    alert('Lead moved to "Already Outreached."');
                }
            }
        }

        function closeDraftModal() {
            document.getElementById('draftModal').classList.remove('active');
            window.currentLead = null;
        }

        function copyToClipboard(text) {
            const decoded = text.replace(/\\n/g, '\n');
            navigator.clipboard.writeText(decoded).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function escapeQuotes(text) {
            return text.replace(/'/g, "\\'").replace(/"/g, '\\"');
        }

        // Start
        init();
    </script>
</body>
</html>
